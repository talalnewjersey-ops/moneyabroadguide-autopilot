name: MAG SEO Autopilot

on:
  workflow_dispatch:

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run audit
        run: python workflows/site_audit.py

      - name: Run optimizer
       run: python workflows/seo_optimizer.py

      - name: Save report
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: artifacts/
