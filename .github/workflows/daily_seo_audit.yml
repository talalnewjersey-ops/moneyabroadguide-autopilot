name: MAG SEO Autopilot

on:
  workflow_dispatch:

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run audit script
        run: |
          python workflows/site_audit.py
