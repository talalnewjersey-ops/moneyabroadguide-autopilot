name: MAG SEO Autopilot

on:
  workflow_dispatch:

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: pip install requests beautifulsoup4

      - name: Real SEO Audit
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup

          url = "https://moneyabroadguide.com"
          headers = {"User-Agent": "Mozilla/5.0"}

          r = requests.get(url, headers=headers)

          print("STATUS:", r.status_code)

          if "Checking your browser" in r.text:
              print("❌ Cloudflare blocking SEO bots")
          else:
              print("✅ Site accessible")

          soup = BeautifulSoup(r.text, "html.parser")

          title = soup.title.string if soup.title else "No title"
          print("TITLE:", title)

          meta = soup.find("meta", attrs={"name": "description"})
          print("META:", meta.get("content") if meta else "❌ Missing")

          h1 = soup.find_all("h1")
          print("H1 COUNT:", len(h1))
          EOF

      - name: SEO Recommendations
        run: |
          echo "===== SEO FIXES ====="
          echo "1. Improve homepage title"
          echo "2. Add meta descriptions"
          echo "3. Fix H1 structure"
          echo "4. Add internal links"
          echo "5. Remove empty links"
