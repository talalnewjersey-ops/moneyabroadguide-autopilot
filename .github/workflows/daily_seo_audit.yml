name: MAG SEO Autopilot

on:
  workflow_dispatch:

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug files (IMPORTANT)
        run: ls -R

      - name: Run SAFE SEO optimizer
        run: python seo_safe_optimizer.py