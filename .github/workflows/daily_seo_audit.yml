      - name: Advanced SEO Audit
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup

          urls = [
              "https://moneyabroadguide.com",
              "https://moneyabroadguide.com/wp-json/mag/v1/posts"
          ]

          headers = {"User-Agent": "Mozilla/5.0"}

          for url in urls:
              print("\n====== CHECKING:", url, "======")

              try:
                  r = requests.get(url, headers=headers)
                  print("STATUS:", r.status_code)

                  if "Checking your browser" in r.text:
                      print("❌ Cloudflare blocking SEO bots")

                  soup = BeautifulSoup(r.text, "html.parser")

                  # TITLE
                  title = soup.title.string if soup.title else "Missing"
                  print("TITLE:", title)

                  # META
                  meta = soup.find("meta", attrs={"name": "description"})
                  print("META:", meta.get("content") if meta else "Missing")

                  # H1
                  h1 = soup.find_all("h1")
                  print("H1 COUNT:", len(h1))

                  # LINKS
                  links = soup.find_all("a")
                  empty_links = [a for a in links if a.get("href") == "#" or not a.get("href")]

                  print("TOTAL LINKS:", len(links))
                  print("EMPTY LINKS:", len(empty_links))

              except Exception as e:
                  print("ERROR:", e)
          EOF