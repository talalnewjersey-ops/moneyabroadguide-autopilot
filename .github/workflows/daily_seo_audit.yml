name: MAG Safe SEO Guard

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * *"

jobs:
  safe_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install lightweight dependencies
        run: pip install requests beautifulsoup4

      - name: Run safe audit
      - name: Run SAFE SEO optimizer
        run: python workflows/seo_safe_optimizer.py
        env:
          WP_URL: https://moneyabroadguide.com
        run: python workflows/safe_site_audit.py

      - name: Run safe recommendations
        env:
          WP_URL: https://moneyabroadguide.com
        run: python workflows/safe_seo_guard.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: mag-safe-seo-report
          path: artifacts/
