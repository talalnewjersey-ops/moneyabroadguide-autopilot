name: MAG Autopilot Agent

on:
  workflow_dispatch:

jobs:
  seo_agent:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch posts from WordPress (Cloudflare bypass)
        run: |
          curl -L \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          -H "x-mag-api-key: ${{ secrets.MAG_API_KEY }}" \
          "${{ secrets.WP_URL }}/wp-json/mag/v1/posts"
